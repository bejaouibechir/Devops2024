services:
  db:
    build: ./database
    image: ${REGISTRY_IMAGE:-flotte}/database:${TAG:-latest}
    container_name: flotte_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      SA_PASSWORD: ${SA_PASSWORD:-FlotteDevOps2024!}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - flotte-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/bin/bash -c '(/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" >/dev/null 2>&1) || (/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" >/dev/null 2>&1)'"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: ./backend
    image: ${REGISTRY_IMAGE:-flotte}/backend:${TAG:-latest}
    container_name: flotte_backend
    environment:
      SA_PASSWORD: ${SA_PASSWORD:-FlotteDevOps2024!}
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=FlotteDB;User Id=sa;Password=${SA_PASSWORD:-FlotteDevOps2024!};TrustServerCertificate=True"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flotte-network

  frontend:
    build: ./frontend
    image: ${REGISTRY_IMAGE:-flotte}/frontend:${TAG:-latest}
    container_name: flotte_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - flotte-network

networks:
  flotte-network:
    driver: bridge

volumes:
  sqlserver_data:

