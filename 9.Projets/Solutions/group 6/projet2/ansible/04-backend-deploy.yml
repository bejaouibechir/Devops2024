---
# PLAYBOOK : Déploiement de l'application Spring Boot WAR sur Tomcat
# Principe Ansible : Le déploiement backup l'ancien WAR avant de déployer le nouveau
# Les health checks garantissent que l'application est vraiment opérationnelle

- name: "Déployer l'application StockMaster (WAR) sur Tomcat"
  hosts: backend
  become: true
  become_user: tomcat
  vars_files:
    - vars/secrets.yml

  # Principe Ansible : Les handlers déclenchent les actions après les changements
  handlers:
    - name: restart tomcat
      become_user: root
      service:
        name: tomcat
        state: restarted

  tasks:
    # === SECTION 1 : VALIDATION PRÉ-DÉPLOIEMENT ===
    # Principe Ansible : Vérifier les prérequis avant de toucher au système
    - name: Vérifier que le fichier WAR source existe
      stat:
        path: "{{ backend_war_src }}"
      register: war_source_check
      tags: [backend, deploy]

    - name: ERREUR - Le WAR source n'existe pas !
      fail:
        msg: "Le fichier WAR '{{ backend_war_src }}' est introuvable. Vérifier backend_war_src dans group_vars/all.yml"
      when: not war_source_check.stat.exists
      tags: [backend, deploy]

    # === SECTION 2 : BACKUP DE L'ANCIEN WAR ===
    # Principe Ansible : Toujours sauvegarder avant de remplacer (rollback possible)
    - name: Vérifier si un WAR ancien existe
      stat:
        path: "{{ tomcat_home }}/webapps/{{ war_deploy_name }}"
      register: war_old_check
      tags: [backend, deploy]

    - name: Créer un backup du WAR ancien
      copy:
        src: "{{ tomcat_home }}/webapps/{{ war_deploy_name }}"
        dest: "{{ tomcat_home }}/webapps/{{ war_deploy_name }}.backup.{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: true
      become_user: root
      when: war_old_check.stat.exists
      ignore_errors: true
      tags: [backend, deploy]

    # === SECTION 3 : COPIER LE NOUVEAU WAR ===
    - name: Copier le nouveau WAR vers Tomcat
      copy:
        src: "{{ backend_war_src }}"
        dest: "{{ tomcat_home }}/webapps/{{ war_deploy_name }}"
        mode: "0644"
      become_user: root
      tags: [backend, deploy]

    # === SECTION 4 : REDÉMARRER TOMCAT ET ATTENDRE LE DÉPLOIEMENT ===
    - name: Redémarrer Tomcat (pour charger le nouveau WAR)
      become: true
      become_user: root
      service:
        name: tomcat
        state: restarted
      tags: [backend, deploy]

    # === SECTION 5 : ATTENDRE LE DÉMARRAGE DE L'APPLICATION ===
    # Principe Ansible : Spring Boot démarre en quelques secondes après le redémarrage
    # On teste une route qui existe (mais peut retourner 400/401 car pas d'authentification)
    - name: Attendre que Spring Boot démarre (health check timeout)
      uri:
        url: "http://localhost:{{ tomcat_port }}/stockmaster/api/auth/login"
        method: GET
        status_code: [400, 401, 405]
      register: spring_startup
      retries: 20
      delay: 3
      until: spring_startup.status in [400, 401, 405]
      changed_when: false
      tags: [backend, deploy, healthcheck]

    # === SECTION 6 : VÉRIFIER LA DISPONIBILITÉ SWAGGER ===
    # Principe Ansible : Swagger-UI est une bonne indication que l'app est prête
    - name: Vérifier la disponibilité Swagger-UI
      uri:
        url: "http://localhost:{{ tomcat_port }}/stockmaster/swagger-ui/index.html"
        method: GET
        status_code: 200
      register: swagger_check
      retries: 10
      delay: 2
      until: swagger_check.status == 200
      changed_when: false
      tags: [backend, deploy, healthcheck]

    - name: Afficher le statut du déploiement
      debug:
        msg: |
          Application StockMaster déployée avec succès !
          URL Swagger: http://localhost:{{ tomcat_port }}/stockmaster/swagger-ui/index.html
          Version WAR: {{ war_deploy_name }}
      tags: [backend, deploy, healthcheck]
